<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактировать задачу</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f0f0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background-color: #ffffff;
            padding: 30px 35px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }

        h1 {
            color: #1a73e8;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
            border-bottom: 3px solid #e8edf3;
            padding-bottom: 14px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-weight: 500;
        }

        .message.error {
            background-color: #fde8e8;
            color: #c0392b;
            border: 1px solid #f5c6c6;
        }

        .message.success {
            background-color: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }

        .message.info {
            background-color: #e8f0fe;
            color: #1a5a9c;
            border: 1px solid #d2e3fc;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #333;
        }

        .form-group input[type="text"] {
            width: 100%;
            padding: 12px 18px;
            border: 2px solid #dce1e8;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input[type="text"]:focus {
            border-color: #1a73e8;
            box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.15);
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background-color: #1a73e8;
            color: #fff;
        }

        .btn-primary:hover {
            background-color: #1557b0;
        }

        .btn-secondary {
            background-color: #e8edf3;
            color: #333;
        }

        .btn-secondary:hover {
            background-color: #d5dce6;
        }

        .task-info {
            background-color: #f8f9fb;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            border: 1px solid #eef1f5;
        }

        .task-info strong {
            color: #555;
        }

        .task-info .old-text {
            color: #1e293b;
            font-style: italic;
        }
        
        .priority-select {
            width: 100%;
            padding: 12px 18px;
            border: 2px solid #dce1e8;
            border-radius: 12px;
            font-size: 16px;
            background-color: #fff;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

            .priority-select:focus {
                border-color: #1a73e8;
                box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.15);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✏️ Редактирование задачи</h1>

        <!-- Показываем сообщение, если оно передано -->
        {% if message %}
            <p class="message {{ message_type }}">{{ message }}</p>
        {% endif %}

        <!-- Показываем старый текст для справки -->
        <div class="task-info">
            <strong>Текущий текст:</strong>
            <span class="old-text">«{{ task.text }}»</span>
        </div>

        <form method="POST">
            <div class="form-group">
                <label for="task">Новый текст задачи:</label>
                <input type="text" id="task" name="task" value="{{ task.text }}" required autofocus>
            </div>

            <!-- ↓↓↓ НОВОЕ: ВЫБОР ПРИОРИТЕТА ↓↓↓ -->
            <div class="form-group">
                <label for="priority">Приоритет:</label>
                <select name="priority" id="priority" class="priority-select">
                    <option value="высокий" {% if task.priority == 'высокий' %}selected{% endif %}>
                        🔴 Высокий
                    </option>
                    <option value="средний" {% if task.priority == 'средний' %}selected{% endif %}>
                        🟡 Средний
                    </option>
                    <option value="низкий" {% if task.priority == 'низкий' %}selected{% endif %}>
                        🟢 Низкий
                    </option>
                </select>
            </div>
            <!-- ↑↑↑ НОВОЕ: ВЫБОР ПРИОРИТЕТА ↑↑↑ -->

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">💾 Сохранить</button>
                <a href="/" class="btn btn-secondary">❌ Отмена</a>
            </div>
    </form>
    </div>
</body>
</html>
